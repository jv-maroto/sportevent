<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#111113"/>
  <pattern id="grid-f" patternUnits="userSpaceOnUse" width="40" height="40"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8ff0008" stroke-width="0.5"/></pattern>
  <rect width="800" height="400" fill="url(#grid-f)"/>
  <circle cx="300" cy="350" r="250" fill="#22c55e" opacity="0.05"/>
  <!-- Football/Soccer ball -->
  <g transform="translate(330, 80)">
    <circle cx="70" cy="70" r="70" fill="none" stroke="#c8ff00" stroke-width="3"/>
    <polygon points="70,20 95,40 85,70 55,70 45,40" fill="#c8ff00" opacity="0.3" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="70" y1="20" x2="70" y2="0" stroke="#c8ff00" stroke-width="1.5" opacity="0.5"/>
    <line x1="95" y1="40" x2="115" y2="25" stroke="#c8ff00" stroke-width="1.5" opacity="0.5"/>
    <line x1="85" y1="70" x2="110" y2="90" stroke="#c8ff00" stroke-width="1.5" opacity="0.5"/>
    <line x1="55" y1="70" x2="30" y2="90" stroke="#c8ff00" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="40" x2="25" y2="25" stroke="#c8ff00" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Field line -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
  <circle cx="400" cy="300" r="40" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.15"/>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="32" fill="#f0f0ec" letter-spacing="8">FUTBOL</text>
