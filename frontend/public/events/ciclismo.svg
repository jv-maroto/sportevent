<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#111113"/>
  <pattern id="grid-c" patternUnits="userSpaceOnUse" width="40" height="40"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8ff0008" stroke-width="0.5"/></pattern>
  <rect width="800" height="400" fill="url(#grid-c)"/>
  <circle cx="600" cy="200" r="250" fill="#c8ff00" opacity="0.04"/>
  <!-- Bike wheel 1 -->
  <g transform="translate(270, 170)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#c8ff00" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#c8ff00" opacity="0.6"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="-42" y1="-42" x2="42" y2="42" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="42" y1="-42" x2="-42" y2="42" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Bike wheel 2 -->
  <g transform="translate(530, 170)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#c8ff00" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#c8ff00" opacity="0.6"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="-42" y1="-42" x2="42" y2="42" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
    <line x1="42" y1="-42" x2="-42" y2="42" stroke="#c8ff00" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Frame -->
  <path d="M270 170 L400 90 L530 170 M400 90 L400 170 M270 170 L400 170 L530 170" fill="none" stroke="#c8ff00" stroke-width="2.5" opacity="0.7"/>
  <!-- Handlebars -->
  <path d="M400 90 L420 70 L440 75" fill="none" stroke="#c8ff00" stroke-width="2" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="100" y1="140" x2="180" y2="140" stroke="#c8ff00" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="170" x2="170" y2="170" stroke="#c8ff00" stroke-width="1" opacity="0.15"/>
  <line x1="110" y1="200" x2="175" y2="200" stroke="#c8ff00" stroke-width="1" opacity="0.1"/>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="32" fill="#f0f0ec" letter-spacing="8">CICLISMO</text>
</svg>
